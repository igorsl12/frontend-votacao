<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Votação - Admin</title>
    <link rel="icon" type="image/png" href="imagemCapa.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar sidebar-admin">
            <div class="user-info">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=3498db&color=fff" alt="Avatar do Usuário" class="avatar">
                <h3 id="user-name-menu">Painel Admin</h3>
                <p>Modo Gerenciamento</p>
            </div>
            
            <nav class="menu">
                <a href="admin.html" class="menu-item"><span>📈</span> Resultados em Tempo Real</a>
                <a href="admin-gerenciar.html" class="menu-item active"><span>👦🏻</span> Gerenciar Candidatos</a>
                 <a href="perfil-admin.html" class="menu-item"><span>👤</span> Meu Perfil</a>
            </nav>

            <div class="logout-section">
                <a href="#" id="btn-sair" class="menu-item logout-btn"><span>🚪</span> Sair</a>
            </div>
        </aside>

        <main class="content" style="display: flex; flex-direction: column; align-items: center; padding-top: 40px;">
            
            <header style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 2.2em; color: #2c3e50;">Gerenciar Candidatos</h2>
                <p style="color: #7f8c8d; font-size: 1.1em; margin-top: 8px;">Adicione, edite ou remova participantes da votação.</p>
            </header>

            <div id="mensagem-alerta" class="alerta oculta"></div>

            <div class="card" style="width: 100%; max-width: 500px; margin: 0 auto 50px auto; padding: 30px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-radius: 15px;">                
                
                <h3 style="margin-bottom: 20px; text-align: center; color: #2c3e50; font-size: 1.4em; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px;">Adicionar Novo Candidato</h3>
                
                <form id="form-adicionar" style="display: flex; flex-direction: column; gap: 15px;">
                    
                    <div>
                        <label style="display: block; font-weight: bold; color: #34495e; margin-bottom: 5px; font-size: 1em;">Nome do Candidato</label>
                        <input type="text" id="nome-novo-participante" placeholder="Digite o nome completo..." required 
                               style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 1em; box-sizing: border-box; background: #f9fbfb; color: #2c3e50;">
                    </div>

                    <div>
                        <label style="display: block; font-weight: bold; color: #34495e; margin-bottom: 5px; font-size: 1em;">Foto do Candidato</label>
                        <input type="file" id="input-arquivo-foto" accept="image/*" 
                               style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #bdc3c7; font-size: 1em; box-sizing: border-box; background: #fff; color: #2c3e50;">
                        <p style="font-size: 0.8em; color: #7f8c8d; margin-top: 5px;">*Selecione uma imagem do seu computador (.jpg, .png)</p>
                    </div>

                    <button type="submit" 
                            style="background-color: #2ecc71; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; transition: 0.3s; margin-top: 5px;">
                         Adicionar Candidato
                    </button>

                </form>

            </div>

            <div style="width: 100%; max-width: 900px; margin: 0 auto;">
                <h3 style="margin-bottom: 20px; color: #2c3e50; font-size: 1.5em; text-align: center;">Candidatos Cadastrados</h3>
                
                <div id="lista-participantes-admin" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start;">
                    <p style="text-align: center; grid-column: span 3; color: #7f8c8d;">Carregando...</p>
                </div>
            </div>

        </main>
        
    </div>

    <script src="admin-gerenciar.js"></script>
</body>
</html>
