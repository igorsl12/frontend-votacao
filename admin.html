<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Resultados da Votação</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar sidebar-admin">
            <div class="user-info">
                <img src="https://via.placeholder.com/60" alt="Avatar Admin" class="avatar">
                <h3>Painel Admin</h3>
                <p>Modo Gerenciamento</p>
            </div>
            
            <nav class="menu">
                <a href="admin.html" class="menu-item active"><span>📈</span> Resultados em Tempo Real</a>
                <a href="admin-gerenciar.html" class="menu-item"><span>👦🏻</span> Gerenciar Candidatos</a>
                <a href="/configuracoes" class="menu-item"><span>⚙️</span> Configurações</a>
                <a href="perfil-admin.html" class="menu-item"><span>👤</span> Meu Perfil</a>
            </nav>

            <div class="logout-section">
                <a href="#" id="btn-sair" class="menu-item logout-btn"><span>🚪</span> Sair</a>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2>Resultados da Votação</h2>
                <p>Acompanhe os votos em tempo real.</p>
            </header>

           <div class="card" style="width: 100%; max-width: 900px; margin: 0 auto; padding: 40px;">
                
                <div style="position: relative; height: 60vh; width: 100%;">
                    <canvas id="graficoVotos"></canvas>
                </div>
                
            </div>
            

            <div class="card" style="width: 100%; max-width: 900px; margin: 30px auto 0 auto; padding: 40px;">
                <header style="margin-bottom: 20px; text-align: center;">
                    <h3 style="color: #2c3e50; font-size: 1.5em;">Frequência de Votos</h3>
                    <p style="color: #7f8c8d;">Picos de votação registrados por horário.</p>
                </header>
                <div style="position: relative; height: 40vh; width: 100%;">
                    <canvas id="graficoFrequencia"></canvas>
                </div>
            </div>
        </main>
        
    </div>

    <script src="admin.js"></script>
</body>
</html>
