<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Resultados da Votação</title>
    <link rel="icon" type="image/png" href="imagemCapa.png">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>
    

    <div class="dashboard-container">
        
        <aside class="sidebar sidebar-admin">
            <div class="user-info">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=3498db&color=fff" alt="Avatar do Usuário" class="avatar">
                <h3>Painel Admin</h3>
                <p>Modo Gerenciamento</p>
            </div>
            
            <nav class="menu">
                <a href="perfil-admin.html" class="menu-item"><span>👤</span> Meu Perfil</a>
                <a href="admin.html" class="menu-item active"><span>📈</span> Resultados em Tempo Real</a>
                <a href="admin-gerenciar.html" class="menu-item"><span>👦🏻</span> Gerenciar Candidatos</a>
            </nav>

            <div class="logout-section">
                <a href="#" id="btn-sair" class="menu-item logout-btn"><span>🚪</span> Sair</a>
            </div>
        </aside>

        <main class="content">
            <header style="text-align: center;">
                <h2>Resultados da Votação</h2>
                <p>Acompanhe os votos em tempo real.</p>
            </header>

           <div class="card" style="width: 100%; max-width: 900px; margin: 0 auto; padding: 40px;">
                
                <div style="position: relative; height: 60vh; width: 100%;">
                    <canvas id="graficoVotos"></canvas>
                </div>
                
            </div>
            

            <div class="card" style="width: 100%; max-width: 900px; margin: 30px auto 0 auto; padding: 40px;">
                <header style="margin-bottom: 20px; text-align: center;">
                    <h3 style="color: #2c3e50; font-size: 1.5em;">Frequência de Votos</h3>
                    <p style="color: #7f8c8d;">Picos de votação registrados por horário.</p>
                </header>
                <div style="position: relative; height: 40vh; width: 100%;">
                    <canvas id="graficoFrequencia"></canvas>
                </div>
            </div>
            <div style="width: 100%; max-width: 1000px; margin: 0 auto 30px auto; background: #fff; padding: 20px 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; border-left: 5px solid #2ecc71;" id="faixa-status">
                
                <div>
                    <h3 style="margin: 0; color: #2c3e50; font-size: 1.4em;">Status da Votação: 
                        <span id="texto-status" style="color: #2ecc71; font-weight: 900;">ABERTO</span>
                    </h3>
                </div>
                
                <button id="btn-alternar-votacao" style="width: max-content; background: #e74c3c; color: #fff; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(231, 76, 60, 0.3);">
                    Encerrar Votação
                </button>

            </div>
        </main>
        
    </div>

    <script src="admin.js"></script>
</body>
</html>
