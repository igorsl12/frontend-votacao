<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="user-info">
                <img id="user-avatar" src="https://via.placeholder.com/60" alt="Avatar do Usuário" class="avatar">
                <h3 id="user-name">Carregando...</h3>
                <p id="user-email">Carregando...</p>
            </div>
            <nav class="menu">
                <a href="/perfil" class="menu-item"><span>👤</span> Meu Perfil</a>
                <a href="/" class="menu-item active"><span>📊</span> Votação Atual</a>
                <a href="/historico" class="menu-item"><span>🗳️</span> Histórico de Votos</a>
                <a href="/configuracoes" class="menu-item"><span>⚙️</span> Configurações</a>
            </nav>

            <div class="logout-section">
                <a href="login.html" class="menu-item logout-btn"><span>🚪</span> Sair</a>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2>Paredão BBB26</h2>
                <p>Escolha quem você quer eliminar nesta semana. Seu voto faz a diferença!</p>
            </header>

            <div id="mensagem-alerta" class="alerta oculta"></div>

            <div class="participantes-grid" id="lista-participantes">
                
                <div class="card-participante">
                    <img src="https://via.placeholder.com/150" alt="Foto do Participante" class="foto-participante">
                    <h3>Participante 1</h3>
                    <p>Emparedado pelo Líder</p>
                    <button class="btn-votar" onclick="registrarVoto(1, 'Participante 1')">VOTAR</button>
                </div>

                <div class="card-participante">
                    <img src="https://via.placeholder.com/150" alt="Foto do Participante" class="foto-participante">
                    <h3>Participante 2</h3>
                    <p>Mais votado da casa</p>
                    <button class="btn-votar" onclick="registrarVoto(2, 'Participante 2')">VOTAR</button>
                </div>

                <div class="card-participante">
                    <img src="https://via.placeholder.com/150" alt="Foto do Participante" class="foto-participante">
                    <h3>Participante 3</h3>
                    <p>Contragolpe</p>
                    <button class="btn-votar" onclick="registrarVoto(3, 'Participante 3')">VOTAR</button>
                </div>

            </div>
        </main>
        
    </div>

    <script src="votacao.js"></script>
</body>
</html>
