<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="user-info">
                <img id="user-avatar" src="https://via.placeholder.com/60" alt="Avatar do Usuário" class="avatar">
                <h3 id="user-name">Carregando...</h3>
                <p id="user-email">Carregando...</p>
            </div>
            <nav class="menu">
                <a href="perfil.html" class="menu-item"><span>👤</span> Meu Perfil</a>
                <a href="/" class="menu-item active"><span>📊</span> Votação Atual</a>
                <a href="historico.html" class="menu-item"><span>🗳️</span> Histórico de Votos</a>
             </nav>

            <div class="logout-section">
                <a href="login.html" class="menu-item logout-btn"><span>🚪</span> Sair</a>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2>Votação Atual</h2>
                <p>Escolha quem você quer que ganhe. Seu voto faz a diferença!</p>
            </header>

            <div id="mensagem-alerta" class="alerta oculta"></div>

            <div class="participantes-grid" id="lista-participantes">
                
                <p style="text-align: center; width: 100%;">Carregando...</p>   
            </div>
        </main>
        
    </div>

    <script src="votacao.js"></script>
</body>
</html>
