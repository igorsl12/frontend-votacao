<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Votação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-header">
            <h2>Acesso ao Sistema</h2>
            <p>Entre com suas credenciais para acessar o sistema de votação.</p>
        </div>

        <div id="mensagem-alerta" class="alerta oculta"></div>

        <form id="form-login" class="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuemail@email.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-votar">Entrar no Sistema</button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="cadastro.html" style="color: #3498db; text-decoration: none; font-size: 0.9em; font-weight: bold;">Não tem uma conta? Cadastre-se aqui</a>
            </div>
        </form>
        
        <div class="login-footer">
            <p>Todos direitos reservados &copy; 2026 </p>
            <p>Desenvolvido por Igor Silva Lima </p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
